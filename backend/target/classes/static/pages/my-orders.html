<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — MusicOnline</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ── Order list ── */
    .order-list {
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }
    .order-card {
      background: var(--bg-card);
      border: 1px solid var(--neutral-200);
      border-radius: var(--r-xl);
      padding: var(--sp-5);
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: var(--sp-4);
      align-items: center;
      transition: box-shadow .15s;
    }
    .order-card:hover {
      box-shadow: var(--shadow-md);
    }
    .order-thumb {
      width: 72px; height: 72px;
      border-radius: var(--r-lg);
      overflow: hidden;
      background: linear-gradient(135deg, var(--neutral-800), var(--brand-900));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .order-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .order-thumb-disc {
      color: rgba(255,255,255,.3);
      font-size: 28px;
    }
    .order-body {}
    .order-title {
      font-size: var(--fs-md);
      font-weight: var(--fw-semi);
      color: var(--text-primary);
      margin-bottom: 3px;
    }
    .order-artist {
      font-size: var(--fs-sm);
      color: var(--brand-600);
      margin-bottom: var(--sp-2);
    }
    .order-meta {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      font-size: var(--fs-xs);
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .order-meta i { color: var(--text-muted); }
    .order-price-col {
      text-align: right;
    }
    .order-price {
      font-size: var(--fs-xl);
      font-weight: var(--fw-black);
      color: var(--brand-700);
    }
    .order-date {
      font-size: var(--fs-xs);
      color: var(--text-muted);
      margin-top: 4px;
    }
    .order-status {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: var(--fs-xs); font-weight: var(--fw-semi);
      color: #2e7d32; background: #e8f5e9;
      border-radius: var(--r-full);
      padding: 3px 10px;
      margin-top: 6px;
    }

    /* ── Empty state ── */
    .orders-empty {
      text-align: center;
      padding: var(--sp-20) var(--sp-6);
      color: var(--text-muted);
    }
    .orders-empty .icon {
      font-size: 56px;
      color: var(--neutral-300);
      margin-bottom: var(--sp-4);
    }
    .orders-empty h3 {
      font-size: var(--fs-xl);
      font-weight: var(--fw-semi);
      color: var(--text-secondary);
      margin-bottom: var(--sp-2);
    }

    /* ── Summary banner ── */
    .orders-summary {
      background: linear-gradient(135deg, var(--neutral-900), var(--brand-900));
      border-radius: var(--r-xl);
      padding: var(--sp-5) var(--sp-7);
      margin-bottom: var(--sp-6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--sp-4);
    }
    .orders-summary .sum-label {
      font-size: var(--fs-xs);
      color: var(--gold-400);
      font-weight: var(--fw-semi);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 4px;
    }
    .orders-summary .sum-val {
      font-size: var(--fs-2xl);
      font-weight: var(--fw-black);
      color: #fff;
    }

    @media (max-width: 600px) {
      .order-card {
        grid-template-columns: 56px 1fr;
      }
      .order-price-col {
        grid-column: 2;
        text-align: left;
      }
    }
  </style>
</head>
<body>
<div class="app-layout">

  <!-- ══════════ Sidebar ══════════ -->
  <aside class="sidebar" id="sidebar">
    <a href="home.html" class="sidebar-logo">
      <div class="sidebar-logo-disc"></div>
      <span class="sidebar-logo-text">Music<span>Online</span></span>
    </a>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a class="nav-item" href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a class="nav-item" href="search.html"><i class="fas fa-search"></i> Browse Vinyl</a>
      <div class="nav-section">My Account</div>
      <a class="nav-item" href="my-vinyls.html"><i class="fas fa-compact-disc"></i> My Listings</a>
      <a class="nav-item" href="add-vinyl.html"><i class="fas fa-plus-circle"></i> Add Vinyl</a>
      <a class="nav-item active" href="my-orders.html"><i class="fas fa-shopping-bag"></i> My Orders</a>
      <a class="nav-item" href="profile.html"><i class="fas fa-user"></i> Profile</a>
      <div id="admin-nav-section" style="display:none">
        <div class="nav-section">Admin</div>
        <a class="nav-item" href="admin.html"><i class="fas fa-shield-alt"></i> Admin Panel</a>
      </div>
    </nav>
    <div class="sidebar-user" onclick="moLogout && moLogout()">
      <div class="sidebar-avatar"><i class="fas fa-user"></i></div>
      <div class="sidebar-user-info">
        <div class="sidebar-username" id="sidebar-username">User</div>
        <div class="sidebar-role" id="sidebar-role">user</div>
      </div>
      <i class="fas fa-sign-out-alt" style="color:rgba(255,255,255,.3);font-size:var(--fs-sm)"></i>
    </div>
  </aside>

  <!-- ══════════ Main content ══════════ -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title"><i class="fas fa-shopping-bag" style="color:var(--brand-400)"></i> My Orders</div>
      <div class="topbar-actions">
        <a href="search.html" class="btn btn-primary btn-sm"><i class="fas fa-search"></i> Browse Vinyl</a>
      </div>
    </header>

    <main class="page-content">
      <!-- Summary banner (shown after load) -->
      <div class="orders-summary" id="orders-summary" style="display:none">
        <div>
          <div class="sum-label">Total Orders</div>
          <div class="sum-val" id="sum-count">0</div>
        </div>
        <div>
          <div class="sum-label">Total Spent</div>
          <div class="sum-val" id="sum-total">£0.00</div>
        </div>
      </div>

      <!-- Loading -->
      <div id="orders-loading" style="text-align:center;padding:var(--sp-12)">
        <div class="spinner" style="margin:0 auto var(--sp-4)"></div>
        <p style="color:var(--text-muted)">Loading your orders…</p>
      </div>

      <!-- Order list -->
      <div class="order-list" id="order-list" style="display:none"></div>

      <!-- Empty state -->
      <div class="orders-empty" id="orders-empty" style="display:none">
        <div class="icon"><i class="fas fa-shopping-bag"></i></div>
        <h3>No orders yet</h3>
        <p>When you purchase vinyl records, they'll appear here.</p>
        <a href="search.html" class="btn btn-primary" style="margin-top:var(--sp-5)">
          <i class="fas fa-search"></i> Browse Vinyl
        </a>
      </div>
    </main>
  </div>

</div>

<div id="toast-container"></div>

<script src="../js/api-base.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script>
  var user = requireLogin();
  if (!user) { /* requireLogin redirects */ }

  /* Render sidebar */
  if (typeof renderSidebarUser === 'function') renderSidebarUser(user);

  /* Show admin nav if admin */
  if (user.role === 'ADMIN') {
    var adminSection = document.getElementById('admin-nav-section');
    if (adminSection) adminSection.style.display = 'block';
  }

  /* ── Load orders ── */
  var token = moGetToken ? moGetToken() : null;
  fetch(moApiBaseUrl() + '/api/orders/mine', {
    headers: {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/json'
    }
  })
  .then(function (r) {
    if (!r.ok) throw new Error('Failed to load orders');
    return r.json();
  })
  .then(function (orders) {
    document.getElementById('orders-loading').style.display = 'none';

    if (!orders || orders.length === 0) {
      document.getElementById('orders-empty').style.display = 'block';
      return;
    }

    /* Summary */
    var totalSpent = orders.reduce(function (acc, o) { return acc + Number(o.pricePaid); }, 0);
    document.getElementById('sum-count').textContent = orders.length;
    document.getElementById('sum-total').textContent = fmtPrice(totalSpent);
    document.getElementById('orders-summary').style.display = 'flex';

    /* Render list */
    var list = document.getElementById('order-list');
    list.style.display = 'flex';
    orders.forEach(function (o) {
      var card = document.createElement('div');
      card.className = 'order-card';

      /* Thumbnail */
      var thumbHtml;
      if (o.imageUrl) {
        thumbHtml = '<div class="order-thumb"><img src="' + escHtml(o.imageUrl) +
          '" alt="' + escHtml(o.title) + '" onerror="this.parentNode.innerHTML=\'<i class=\\\"fas fa-record-vinyl order-thumb-disc\\\"></i>\'"></div>';
      } else {
        thumbHtml = '<div class="order-thumb"><i class="fas fa-record-vinyl order-thumb-disc"></i></div>';
      }

      /* Date */
      var dateStr = o.orderedAt ? fmtDate(o.orderedAt) : '—';

      card.innerHTML =
        thumbHtml +
        '<div class="order-body">' +
          '<div class="order-title">' + escHtml(o.title) + '</div>' +
          '<div class="order-artist">' + escHtml(o.artist) + '</div>' +
          '<div class="order-meta">' +
            typeBadge(o.vinylType) +
            '<span><i class="fas fa-store"></i> ' + escHtml(o.sellerUsername || 'Unknown') + '</span>' +
          '</div>' +
          '<div class="order-status"><i class="fas fa-check-circle"></i> Purchased</div>' +
        '</div>' +
        '<div class="order-price-col">' +
          '<div class="order-price">' + fmtPrice(o.pricePaid) + '</div>' +
          '<div class="order-date">' + dateStr + '</div>' +
          '<div style="margin-top:var(--sp-2)">' +
            '<a href="vinyl-detail.html?id=' + o.vinylId + '" class="btn btn-ghost btn-sm">' +
              '<i class="fas fa-eye"></i> View' +
            '</a>' +
          '</div>' +
        '</div>';

      list.appendChild(card);
    });
  })
  .catch(function (err) {
    document.getElementById('orders-loading').style.display = 'none';
    document.getElementById('orders-empty').style.display = 'block';
    if (typeof showToast === 'function') showToast('Failed to load orders: ' + err.message, 'error');
  });
</script>
</body>
</html>
