spring:
  application:
    name: musiconline-api
  datasource:
    url: jdbc:mysql://localhost:3306/music_online?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: A883709A
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080
  servlet:
    context-path: /
  # Web UI is served from classpath:/static (see pom.xml: frontend copied from ../frontend on process-resources).
  # Open http://localhost:8080/ after: mvn spring-boot:run

# JWT secret — override in production (min 256 bits for HS256)
musiconline:
  jwt:
    secret: "MusicOnlineDevSecretKeyMustBeAtLeast256BitsLongForHS256AlgorithmSecurity2026!!"
    expiration-ms: 86400000

logging:
  level:
    com.musiconline: INFO
    org.springframework.security: WARN
